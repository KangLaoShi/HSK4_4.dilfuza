        const dialogues = [
          {
            title: "1. 小林和小李聊小李的工作",
            content: [
              { speaker: "小林", zh: "听说你又换工作了？今年已经换了三次工作了吧？", py: "Tīngshuō nǐ yòu huàn gōngzuò le? Jīnnián yǐjīng huànle sān cì gōngzuò le ba?", uz: "Eshitishimcha, yana ishingni almashtiribsan? Bu yil bilan uch marta ish almashtirding-a?", ru: "Слышал, ты опять сменил работу? В этом году уже трижды, да?", en: "I heard you changed jobs again? That's three times this year, right?" },
              { speaker: "小李", zh: "别提了！我以为新工作比以前的好，没想到还没有以前好呢。", py: "Biétí le! Wǒ yǐwéi xīn gōngzuò bǐ yǐqián de hǎo, méi xiǎngdào hái méiyǒu yǐqián hǎo ne.", uz: "Gapirma! Yangi ish oldingisidan yaxshiroq deb o'ylabman, oldingisidek ham emas ekan.", ru: "И не говори! Я думал, новая работа лучше прежней, не ожидал, что она хуже.", en: "Don't mention it! I thought the new job would be better, didn't expect it to be worse." },
              { speaker: "小林", zh: "上次那份工作你只做了两个月就离开了，其实，完全适应一个新的工作需要一年时间，所以，经常换工作不一定好。", py: "Shàng cì nà fèn gōngzuò nǐ zhǐ zuòle liǎng ge yuè jiù líkāi le, qíshí, wánquán shìyìng yī ge xīn de gōngzuò xūyào yì nián shíjiān, suǒyǐ, jīngcháng huàn gōngzuò bù yídìng hǎo.", uz: "Oldingi ishingda faqat ikki oy ishlab ketding. Aslida yangi ishga to'liq moslashish uchun bir yil kerak, shuning uchun tez-tez ish almashtirish yaxshi emas.", ru: "На прошлой работе ты пробыл всего два месяца. На самом деле, чтобы полностью адаптироваться нужно год, так что часто менять работу не всегда хорошо.", en: "You only stayed at the last job for two months. Actually, it takes a year to fully adapt to a new job, so changing jobs often isn't necessarily good." },

              { speaker: "小林", zh: "你才到新公司，不要太急着赚钱，多学习才是最重要的。", py: "Nǐ cái dào xīn gōngsī, búyào tài jízhe zhuàn qián, duō xuéxí cái shì zhòngyào de.", uz: "Yangi kompaniyaga endi kelding, pul topishga bunchalik oshiqma, ko'proq o'rganish eng muhimi.", ru: "Ты только пришел в новую компанию, не спеши зарабатывать деньги, важнее всего больше учиться.", en: "You just arrived at the new company, don't rush to make money, learning more is the most important." },
              { speaker: "小李", zh: "好。我一定会努力把现在这份工作做好。", py: "Hǎo. Wǒ yídìng huì nǔlì bǎ xiànzài zhè fèn gōngzuò zuòhǎo.", uz: "Xo'p. Hozirgi ishimni yaxshi bajarishga albatta harakat qilaman.", ru: "Хорошо. Я обязательно постараюсь хорошо делать эту работу.", en: "Okay. I will definitely work hard to do this job well." }

              { speaker: "小李", zh: "按原来的计划应该是两周，但是我们可以提前完成，周末保证做完。", py: "Àn yuánlái de jìhuà yīnggāi shì liǎng zhōu, dànshì wǒmen kěyǐ tíqián wánchéng, zhōumò bǎozhèng zuòwán.", uz: "Asl rejaga ko'ra ikki hafta kerak edi, lekin biz oldindan tugata olamiz, dam olish kunlari tugatishga kafolat beraman.", ru: "По первоначальному плану должно быть две недели, но мы можем закончить раньше, гарантирую завершить к выходным.", en: "According to the original plan it should be two weeks, but we can finish in advance, guaranteed by the weekend." },
              { speaker: "王经理", zh: "虽然最近工作很忙，但你们也要注意身体啊。", py: "Suīrán zuìjìn gōngzuò hěn máng, dàn nǐmen yě yào zhùyì shēntǐ a.", uz: "Garchi so'nggi paytlarda ish juda ko'p bo'lsa ham, sog'lig'ingizga ham e'tibor bering.", ru: "Хотя в последнее время работы много, вам тоже нужно следить за здоровьем.", en: "Although work is busy lately, you also need to take care of your health." },
              { speaker: "小李", zh: "谢谢您！现在有很多事情等着我做，真不知道该先做哪个好。", py: "Xièxie nín! Xiànzài yǒu hěn duō shìqing děngzhe wǒ zuò, zhēn bù zhīdào xiān zuò nǎge hǎo.", uz: "Rahmat! Hozir meni kutib turgan ishlar juda ko'p, rosti qaysi biridan boshlashni ham bilmayapman.", ru: "Спасибо! Сейчас столько дел меня ждут, правда не знаю, за какое браться сначала.", en: "Thank you! Right now there are many things waiting for me, I really don't know which to do first." },
              { speaker: "王经理", zh: "每天早上我都把当天计划要做的事情写在笔记本上，提醒自己安排好时间。你也可以试试这样做。", py: "Měi tiān zǎoshang wǒ dōu bǎ dāngtiān jìhuà yào zuò de shìqing xiě zài bǐjìběn shàng, tíxǐng zìjǐ ānpái hǎo shíjiān. Nǐ yě kěyǐ shìshi zhèyàng zuò.", uz: "Har kuni ertalab men shu kun uchun rejalashtirilgan ishlarni bloknotga yozib qo'yaman, bu vaqtni to'g'ri taqsimlashni eslatib turadi. Sen ham shunday qilib ko'rishing mumkin.", ru: "Каждое утро я записываю запланированные дела в блокнот, чтобы напомнить себе правильно распределить время. Ты тоже можешь так попробовать.", en: "Every morning I write down the planned tasks in a notebook to remind myself to manage time well. You can try this too." },
              { speaker: "小李", zh: "这个办法真不错！这样我就不会手忙脚乱了。", py: "Zhège bànfǎ zhēn búcuò! Zhèyàng wǒ jiù bú huì shǒumáng-jiǎoluàn le.", uz: "Bu usul juda yaxshi ekan! Shunda men betartib bo'lib qolmayman.", ru: "Отличный метод! Так я не буду в панике и суете.", en: "This is a great method! This way I won't be in a rush." }
            ]
          },
          {
            title: "3. 王经理和马经理在说工作",
            content: [
              { speaker: "王经理", zh: "什么事让你这么高兴啊？", py: "Shénme shì ràng nǐ zhème gāoxìng a?", uz: "Seni shunchalik xursand qilgan nima ish?", ru: "Что тебя так радует?", en: "What makes you so happy?" },
              { speaker: "马经理", zh: "我们和上次那个公司的生意终于谈成了。", py: "Wǒmen hé shàng cì nàge gōngsī de shēngyi zhōngyú tánchéng le.", uz: "O'tgan safargi kompaniya bilan biznesimiz nihoyat muvaffaqiyatli kelishildi.", ru: "Мы наконец договорились о сделке с той компанией.", en: "We finally closed the business deal with that company." },
              { speaker: "王经理", zh: "太好了！你工作那么努力，公司会越来越好的。", py: "Tài hǎo le! Nǐ gōngzuò nàme nǔlì, gōngsī huì yuèláiyuè hǎo de.", uz: "Juda yaxshi! Sen shunchalik tirishqoqsan, kompaniya tobora yaxshilanib boradi.", ru: "Отлично! Ты так стараешься, компания будет становиться всё лучше.", en: "That's great! You work so hard, the company will get better and better." },
              { speaker: "马经理", zh: "我原来以为做生意很简单，后来才发现其实并不容易，现在赚钱越来越难了。", py: "Wǒ yuánlái yǐwéi zuò shēngyi hěn jiǎndān, hòulái cái fāxiàn qíshí bìng bù róngyì, xiànzài zhuàn qián yuèláiyuè nán le.", uz: "Men boshida biznes qilish oddiy deb o'ylagandim, keyin bilsam aslida umuman oson emas ekan, hozir pul topish tobora qiyinlashib boryapti.", ru: "Изначально я думал, что вести бизнес легко, а потом понял, что это отнюдь не просто, сейчас зарабатывать всё сложнее.", en: "I originally thought doing business was simple, later found out it's actually not easy, making money is getting harder." },
              { speaker: "王经理", zh: "慢慢来，万事开头难，重要的是要多积累经验。", py: "Mànmàn lái, wànshì kāitóu nán, zhòngyào de shì yào duō jīlěi jīngyàn.", uz: "Sekin-asta, hamma narsaning boshi qiyin, muhimi ko'proq tajriba to'plash kerak.", ru: "Не спеши, любое начало трудно, главное — накапливать больше опыта.", en: "Take it easy, everything is hard at the beginning, the important thing is to accumulate more experience." },
              { speaker: "马经理", zh: "我相信经过我们大家的努力，公司的生意会越做越大，一切都会好的。", py: "Wǒ xiāngxìn jīngguò wǒmen dàjiā de nǔlì, gōngsī de shēngyi huì yuè zuò yuè dà, yíqiè dōu huì hǎo de.", uz: "Ishonamanki barchamizning harakatlarimiz natijasida kompaniya biznesi kattalashib boradi va hammasi yaxshi bo'ladi.", ru: "Я верю, что благодаря нашим общим усилиям бизнес компании будет расти, всё будет хорошо.", en: "I believe through everyone's efforts, the company's business will grow, everything will be fine." }
            ]
          },
          {
            title: "4. 短文 1",
            content: [
              { speaker: "旁白", zh: "我们今年的工作都已经按照计划完成了。这一段时间，尽管工作很紧张，中间也遇到了很多困难，但是因为有大家的努力，我们成功地解决了问题，顺利地完成了工作，非常感谢大家对我的帮助！另外，马经理让我告诉大家一个好消息，因为大家按时完成了工作，公司决定这个月给每人多发三千元奖金。感谢大家这三个多月的努力工作，希望明年能有更大的成绩！", py: "Wǒmen jīnnián de gōngzuò dōu yǐjīng ànzhào jìhuà wánchéng le. Zhè yí duàn shíjiān, jǐnguǎn gōngzuò hěn jǐnzhāng, zhōngjiān yě yùdàole hěn duō kùnnan, dànshì yīnwèi yǒu dàjiā de nǔlì, wǒmen chénggōng de jiějuéle wèntí, shùnlì de wánchéngle gōngzuò, fēicháng gǎnxiè dàjiā duì wǒ de bāngzhù! Lìngwài, Mǎ jīnglǐ ràng wǒ gàosu dàjiā yí ge hǎo xiāoxi, yīnwèi dàjiā ànshí wánchéngle gōngzuò, gōngsī juédìng zhège yuè gěi měi rén duō fā sānqiān yuán jiǎngjīn. Gǎnxiè dàjiā zhè sān ge duō yuè de nǔlì gōngzuò, xīwàng míngnián néng yǒu gèng dà de chéngjì!", uz: "Bu yilgi ishlarimiz rejaga asosan to'liq yakunlandi. Bu vaqt oralig'ida, garchi ish juda tig'iz bo'lsa-da, o'rtada ko'plab qiyinchiliklarga ham duch keldik, ammo barchaning harakati tufayli biz muammolarni muvaffaqiyatli hal qildik, ishlarni silliq yakunladik, yordamingiz uchun barchaga katta rahmat! Bundan tashqari, Ma menejer barchaga bir xushxabarni yetkazishimni so'radi, ishlar o'z vaqtida yakunlangani uchun, kompaniya bu oy barchaga qo'shimcha uch ming yuan mukofot puli berishga qaror qildi. Bu uch oydan ortiq tinimsiz mehnatingiz uchun tashakkur, kelasi yili yanada kattaroq yutuqlarga erishamiz degan umiddaman!", ru: "Наша работа в этом году завершена по плану...", en: "Our work this year has been completed according to plan..." }
            ]
          },
          {
            title: "5. 短文 2",
            content: [
              { speaker: "旁白", zh: "年轻人刚开始工作的时候，不要太急着赚钱，不要眼睛里只有工资和奖金。在工作的前几年，重要的是丰富自己的工作经验，学习与同事交流的方法，积累专业知识，这些比收入重要多了。但是很多时候，我们不得不去做一些自己不愿意做甚至是非常不喜欢的工作。这时，我们最需要的就是对工作的责任心。一个人即使能力再高，经验再丰富，如果对工作没有责任心，也很难把工作做好。", py: "Niánqīng rén gāng kāishǐ gōngzuò de shíhou, bú yào tài jízhe zhuàn qián, bú yào yǎnjing lǐ zhǐ yǒu gōngzī hé jiǎngjīn. Zài gōngzuò de qián jǐ nián, zhòngyào de shì fēngfù zìjǐ de gōngzuò jīngyàn, xuéxí yǔ tóngshì jiāoliú de fāngfǎ, jīlěi zhuānyè zhīshi, zhèxiē bǐ shōurù zhòngyào duō le. Dànshì hěn duō shíhou, wǒmen bù dé bù qù zuò yìxiē zìjǐ bù yuànyì zuò shènzhì shì fēicháng bù xǐhuan de gōngzuò. Zhè shí, wǒmen zuì xūyào de jiù shì duì gōngzuò de zérènxīn. Yí ge rén jíshǐ nénglì zài gāo, jīngyàn zài fēngfù, rúguǒ duì gōngzuò méiyǒu zérènxīn, yě hěn nán bǎ gōngzuò zuòhǎo.", uz: "Yoshlar endigina ish boshlagan paytda, pul topishga bunchalik oshiqmasliklari kerak, faqat maosh va mukofotga e'tibor qaratmaslik lozim. Ishning ilk yillarida o'z ish tajribasini boyitish, hamkasblar bilan muloqot usullarini o'rganish, kasbiy bilimlarni to'plash muhimdir, bular daromaddan ko'ra ancha muhim. Biroq ko'p hollarda biz o'zimiz xohlamagan, hattoki umuman yoqtirmagan ishlarni qilishga majbur bo'lamiz. Shu payt bizga eng keragi bu ishga bo'lgan mas'uliyat hissi. Insonning qobiliyati qanchalik yuqori bo'lmasin, tajribasi qanchalik boy bo'lmasin, agar ishga nisbatan mas'uliyat hissi bo'lmasa, ishni yaxshi bajarishi juda qiyin.", ru: "Молодым людям в начале работы не следует торопиться зарабатывать деньги...", en: "When young people just start working, they shouldn't rush to make money..." }

        const Quiz = ({ questions, title }) => {
          const [currentQ, setCurrentQ] = useState(0);
          const [score, setScore] = useState(0);
          const [showResult, setShowResult] = useState(false);
          const [selectedOpt, setSelectedOpt] = useState(null);
          const [isAnswered, setIsAnswered] = useState(false);

          const handleOptionSelect = (opt) => {
            if (isAnswered) return;
            setSelectedOpt(opt);
            setIsAnswered(true);
            if (opt === questions[currentQ].answer) {
              setScore(score + 1);
            }
          };

          const handleNextQ = () => {
            if (currentQ + 1 < questions.length) {
              setCurrentQ(currentQ + 1);
              setSelectedOpt(null);
              setIsAnswered(false);
            } else {
              setShowResult(true);
            }
          };

          const restart = () => {
            setCurrentQ(0);
            setScore(0);
            setShowResult(false);
            setSelectedOpt(null);
            setIsAnswered(false);
          };

          if (showResult) {
            return (
              <div className="flex flex-col items-center justify-center p-8 bg-slate-800/80 backdrop-blur-md rounded-3xl shadow-xl border border-slate-700 max-w-lg mx-auto mt-10">

                <p className="text-slate-300 mb-6">{title}</p>
                <p className="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-indigo-400 mb-8">
                  {score} / {questions.length}
                </p>
                <button onClick={restart} className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-full font-medium transition">
                  <Icons.RefreshCw /> Qayta urinish
                </button>
              </div>
            );
          }

          // 添加空状态及数据校验保护
          if (!questions || questions.length === 0) {
             return <div className="text-center p-8 text-white">Ma'lumotlar yuklanmoqda...</div>;
          }

          const q = questions[currentQ];
          if (!q || !q.options) {
             return null;
          }

          return (
            <div className="max-w-2xl mx-auto p-4 mt-4">
              <div className="bg-slate-800/60 backdrop-blur-md border border-slate-700/50 rounded-3xl p-6 md:p-10 shadow-xl relative overflow-hidden">
                <div className="absolute top-0 left-0 h-1 bg-slate-700 w-full">
                   <div 
                     className="h-full bg-gradient-to-r from-indigo-500 to-emerald-400 transition-all duration-500"
                     style={{ width: `${((currentQ) / questions.length) * 100}%` }}
                   ></div>
                </div>

                <div className="flex justify-between text-slate-400 text-sm mb-6 font-medium tracking-wider">
                   <span>{title}</span>
                   <span>Savol {currentQ + 1} / {questions.length}</span>
                </div>

                <h3 className="text-3xl text-white font-medium mb-10 text-center">{q.question}</h3>

                <div className="space-y-4">
                  {q.options.map((opt, idx) => {
                    let btnClass = "w-full text-left p-4 rounded-2xl border transition-all duration-300 font-medium text-lg flex justify-between items-center ";
                    
                    if (!isAnswered) {
                      btnClass += "border-slate-600 bg-slate-800/50 text-slate-200 hover:bg-slate-700 hover:border-indigo-500 cursor-pointer";
                    } else {
                      if (opt === q.answer) {
                        btnClass += "border-emerald-500 bg-emerald-500/20 text-emerald-300";
                      } else if (opt === selectedOpt && selectedOpt !== q.answer) {
                        btnClass += "border-rose-500 bg-rose-500/20 text-rose-300";
                      } else {
                        btnClass += "border-slate-700 bg-slate-800/30 text-slate-500 opacity-50 cursor-not-allowed";
                      }
                    }

                    return (
                      <button key={idx} disabled={isAnswered} onClick={() => handleOptionSelect(opt)} className={btnClass}>
                        <span>{opt}</span>
                        {isAnswered && opt === q.answer && <div className="text-emerald-400"><Icons.CheckCircle /></div>}
                        {isAnswered && opt === selectedOpt && opt !== q.answer && <div className="text-rose-400"><Icons.XCircle /></div>}
                      </button>
                    );
                  })}
                </div>

                {isAnswered && (
                  <div className="mt-8 flex justify-end">
                    <button onClick={handleNextQ} className="bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-3 rounded-full font-medium transition flex items-center gap-2 shadow-lg shadow-indigo-900/50">
                      Keyingisi <Icons.ChevronRight />
                    </button>
                  </div>
                )}
              </div>
            </div>
          );
        };

        const TestsView = () => {
          const [activeTest, setActiveTest] = useState('vocab');
          const vocabQuestions = useMemo(() => generateVocabTest(), []);
          
          // 修复：在这里将 q, opts, a 映射为 Quiz 组件期望的 question, options, answer，防止 undefined 报错
          const fillInQuestions = useMemo(() => {
             return fillInQuestionsData.map(item => ({
                 question: item.q,
                 options: item.opts,
                 answer: item.a
             })).sort(() => 0.5 - Math.random());
          }, []);
          
          const grammarQuestions = useMemo(() => {
             return grammarTestQuestionsData.map(item => ({
                 question: item.q,
                 options: item.opts,
                 answer: item.a
             })).sort(() => 0.5 - Math.random());
          }, []);

          return (
            <div className="w-full">
               <div className="flex flex-wrap justify-center gap-2 mb-8 p-2">
                 <button onClick={() => setActiveTest('vocab')} className={`px-6 py-2.5 rounded-full font-medium transition ${activeTest === 'vocab' ? 'bg-indigo-500 text-white shadow-lg' : 'bg-slate-800 text-slate-400 hover:text-white'}`}>
                   Lug'at Testi (31)
                 </button>
                 <button onClick={() => setActiveTest('fillin')} className={`px-6 py-2.5 rounded-full font-medium transition ${activeTest === 'fillin' ? 'bg-indigo-500 text-white shadow-lg' : 'bg-slate-800 text-slate-400 hover:text-white'}`}>
                   So'zlarni To'ldirish
                 </button>
                 <button onClick={() => setActiveTest('grammar')} className={`px-6 py-2.5 rounded-full font-medium transition ${activeTest === 'grammar' ? 'bg-indigo-500 text-white shadow-lg' : 'bg-slate-800 text-slate-400 hover:text-white'}`}>
                   Grammatika Testi
                 </button>
               </div>

               {activeTest === 'vocab' && <Quiz questions={vocabQuestions} title="Lug'at Testi (Barcha so'zlar)" />}
               {activeTest === 'fillin' && <Quiz questions={fillInQuestions} title="So'zlarni To'ldirish (Bo'sh joylarni to'ldiring)" />}
               {activeTest === 'grammar' && <Quiz questions={grammarQuestions} title="Grammatika Testi" />}
            </div>
          );
        };

        function App() {
          const [activeTab, setActiveTab] = useState('flashcards');

          const tabs = [
            { id: 'flashcards', icon: <Icons.BookA />, label: "S'ozlar (Lug'at)" },
            { id: 'dialogues', icon: <Icons.MessageSquare />, label: "Muloqot" },
            { id: 'grammar', icon: <Icons.BookOpen />, label: "Grammatika" },
            { id: 'tests', icon: <Icons.GraduationCap />, label: "Testlar" }
          ];

          return (
            <div className="min-h-screen bg-slate-950 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-indigo-900 via-slate-950 to-slate-950 text-slate-200 font-sans selection:bg-indigo-500/30">

              <header className="pt-12 pb-8 px-4 text-center">
                 <h1 className="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 via-indigo-400 to-purple-400 mb-3 drop-shadow-sm">
                    Xitoy tilini o'rganamiz
                 </h1>
                 <p className="text-lg md:text-xl font-medium text-indigo-300/80">
                    Dilfuza Kāng lǎo shī bilan
                 </p>
              </header>

              <nav className="max-w-3xl mx-auto px-4 mb-10">
                <div className="flex bg-slate-900/60 backdrop-blur-md p-2 rounded-3xl shadow-lg border border-slate-800/80">
                  {tabs.map((tab) => (
                    <button
                      key={tab.id}
                      onClick={() => setActiveTab(tab.id)}
                      className={`flex-1 flex items-center justify-center gap-2 py-3 px-2 rounded-2xl font-medium transition-all duration-300 text-sm md:text-base ${
                        activeTab === tab.id 
                        ? 'bg-indigo-600/90 text-white shadow-md' 
                        : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800/50'
                      }`}
                    >
                      {tab.icon} <span className="hidden md:inline">{tab.label}</span>
                    </button>
                  ))}
                </div>
              </nav>

              <main className="px-4 min-h-[60vh]">
                {activeTab === 'flashcards' && <FlashcardsView />}
                {activeTab === 'dialogues' && <DialoguesView />}
                {activeTab === 'grammar' && <GrammarView />}
                {activeTab === 'tests' && <TestsView />}
              </main>

              <footer className="py-10 text-center text-slate-500 mt-20 border-t border-slate-800/50 bg-slate-950/50 backdrop-blur-sm">
                 <p className="font-semibold text-slate-400">HSK 4 - Lesson 4</p>
                 <p className="mt-2 text-sm">© 2026 Dilfuza Kāng lǎo shī (telegram@diffila)</p>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
